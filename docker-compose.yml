services:
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"   # Kafka-compatible listener (host access)
      - "9644:9644"   # Redpanda Admin API
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E '^Healthy'"]
      interval: 10s
      timeout: 10s
      retries: 10

  redpanda-init:
    image: redpandadata/redpanda:latest
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: /bin/bash
    command: |
      -c "
      rpk topic create nba.game.events   --brokers redpanda:29092 --partitions 8 --replicas 1
      rpk topic create nba.game.features --brokers redpanda:29092 --partitions 8 --replicas 1
      echo 'Topics created.'
      "
    restart: "no"
